<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador de Recargas | Wally & Mercantil</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #1a202c; text-align: center; }
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            color: #718096;
            transition: all 0.2s;
        }
        .tab.active {
            color: #3182ce;
            border-bottom: 2px solid #3182ce;
            margin-bottom: -2px;
        }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        input, select, button {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.2rem;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2b6cb0; }
        .result-box {
            background: #ebf8ff;
            padding: 1rem;
            border-radius: 6px;
            border-left: 4px solid #3182ce;
            display: none;
            margin-top: 1rem;
        }
        .result-box p { margin: 0.4rem 0; font-size: 0.95rem; display: flex; justify-content: space-between;}
        .highlight { font-weight: bold; color: #2b6cb0; font-size: 1.2rem; text-align: center; display: block; margin-bottom: 0.8rem; }
        hr { border: 0; border-top: 1px solid #bee3f8; margin: 0.8rem 0; }
        
        /* Ocultar elementos dinámicamente */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Optimizador de Recargas</h2>
        
        <div class="tabs">
            <div class="tab active" onclick="cambiarPlataforma('wally')" id="tab-wally">Wally</div>
            <div class="tab" onclick="cambiarPlataforma('mercantil')" id="tab-mercantil">Mercantil</div>
        </div>

        <div id="form-container">
            <label id="label-monto" for="montoAproximado">¿Cuánto necesitas recargar aprox? ($)</label>
            <input type="number" id="montoAproximado" placeholder="Ej. 100" min="1" step="0.01">

            <div id="opciones-wally">
                <label for="factorWally">Multiplicador Óptimo (Wally):</label>
                <select id="factorWally">
                    <option value="16.72">Factor Maestro ($16.72) - Doble ahorro</option>
                    <option value="15.05">Factor Alternativo ($15.05) - Ahorro simple</option>
                </select>
            </div>

            <div id="opciones-mercantil" class="hidden">
                <label for="factorMercantil">Adición Óptima (Mercantil):</label>
                <select id="factorMercantil">
                    <option value="1.49">Adición Maestra (+$1.49) - Doble ahorro</option>
                    <option value="12.89">Adición Alternativa (+$12.89) - Doble ahorro</option>
                </select>
            </div>

            <button onclick="calcularOptimo()">Generar Monto Perfecto</button>
        </div>

        <div id="resultado" class="result-box">
            <span class="highlight" id="montoFinal"></span>
            <p><span>Comisión Base:</span> <span id="comision"></span></p>
            <p><span>ITBMS (7%):</span> <span id="itbms"></span></p>
            <hr>
            <p><strong id="label-total-neto">Total a Pagar:</strong> <strong id="totalMonto"></strong></p>
        </div>
    </div>

    <script>
        let plataformaActual = 'wally';

        function cambiarPlataforma(plataforma) {
            plataformaActual = plataforma;
            
            // Actualizar UI de las pestañas
            document.getElementById('tab-wally').classList.toggle('active', plataforma === 'wally');
            document.getElementById('tab-mercantil').classList.toggle('active', plataforma === 'mercantil');
            
            // Mostrar/Ocultar opciones correspondientes
            document.getElementById('opciones-wally').classList.toggle('hidden', plataforma !== 'wally');
            document.getElementById('opciones-mercantil').classList.toggle('hidden', plataforma !== 'mercantil');
            
            // Cambiar textos según el contexto
            document.getElementById('label-monto').innerText = plataforma === 'wally' 
                ? '¿Cuánto necesitas recargar aprox? ($)' 
                : '¿Cuánto aproximado quieres deducir de tu tarjeta? ($)';
                
            // Ocultar resultados previos al cambiar de pestaña
            document.getElementById('resultado').style.display = 'none';
        }

        // Función de redondeo bancario estándar a 2 decimales
        const redondear = (num) => Math.round((num + Number.EPSILON) * 100) / 100;

        function calcularOptimo() {
            const montoInput = parseFloat(document.getElementById('montoAproximado').value);

            if (isNaN(montoInput) || montoInput <= 0) {
                alert("Por favor, ingresa un monto válido mayor a 0.");
                return;
            }

            let montoOptimo, comision, itbms, resultadoFinalTexto, etiquetaFinalTexto;

            if (plataformaActual === 'wally') {
                const factor = parseFloat(document.getElementById('factorWally').value);
                
                // Lógica Wally: Encontrar el múltiplo entero del factor
                let bloques = Math.floor(montoInput / factor);
                if (bloques === 0) bloques = 1;
                
                montoOptimo = redondear(bloques * factor);
                comision = redondear(montoOptimo * 0.0299);
                itbms = redondear(comision * 0.07);
                
                const totalAPagar = redondear(montoOptimo + comision + itbms);
                
                resultadoFinalTexto = `$${totalAPagar.toFixed(2)}`;
                etiquetaFinalTexto = "Total Descontado (Recarga + Comisiones):";
                document.getElementById('montoFinal').innerText = `Recarga Exacta a ingresar: $${montoOptimo.toFixed(2)}`;

            } else {
                const adicion = parseFloat(document.getElementById('factorMercantil').value);
                
                // Lógica Mercantil: Múltiplo de 20 más la adición estratégica
                const multiplo20 = Math.floor(montoInput / 20) * 20;
                montoOptimo = redondear(multiplo20 + adicion);
                
                // Si el cálculo da menor a 20 (ej. input fue 15), forzamos al menos el primer bloque de 20
                if (multiplo20 === 0) montoOptimo = redondear(20 + adicion);

                comision = redondear(montoOptimo * 0.05);
                itbms = redondear(comision * 0.07);
                
                const netoRecibido = redondear(montoOptimo - comision - itbms);
                
                resultadoFinalTexto = `$${netoRecibido.toFixed(2)}`;
                etiquetaFinalTexto = "Saldo Neto que recibirás:";
                document.getElementById('montoFinal').innerText = `Deducción Exacta a ingresar: $${montoOptimo.toFixed(2)}`;
            }

            // Actualizar el DOM
            document.getElementById('comision').innerText = `$${comision.toFixed(2)}`;
            document.getElementById('itbms').innerText = `$${itbms.toFixed(2)}`;
            document.getElementById('label-total-neto').innerText = etiquetaFinalTexto;
            document.getElementById('totalMonto').innerText = resultadoFinalTexto;

            // Mostrar resultados
            document.getElementById('resultado').style.display = 'block';
        }
    </script>

</body>
</html>
