<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Enlace</title>
    <style>
        /* Diseño moderno para la landing page */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: #374151;
        }
        .tarjeta {
            background: white; padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
            max-width: 400px; width: 90%;
        }
        h2 { margin-top: 0; color: #111827; }
        .mensaje { margin: 20px 0; font-size: 16px; min-height: 24px; color: #6b7280; }
        
        /* Botón principal */
        .boton-enlace {
            display: none; /* Oculto hasta tener el enlace */
            background-color: #2563eb; color: white; padding: 14px 28px;
            text-decoration: none; border-radius: 8px; font-weight: 600;
            font-size: 16px; transition: background-color 0.3s;
            margin-bottom: 20px; width: 100%; box-sizing: border-box;
        }
        .boton-enlace:hover { background-color: #1d4ed8; }
        
        /* Botón secundario para refrescar */
        .boton-recargar {
            background: none; border: none; color: #2563eb; cursor: pointer;
            text-decoration: underline; font-size: 14px; padding: 10px;
        }

        /* Animación de carga (Spinner) */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #2563eb;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h2>Tu Enlace Seguro</h2>
        <div class="loader" id="spinner"></div>
        <div class="mensaje" id="texto-mensaje">Haz clic para consultar tu correo...</div>
        
        <a id="botonEnlace" class="boton-enlace" href="#" target="_blank">Entrar ahora</a>
        
        <button class="boton-recargar" onclick="buscarEnlace()">Consultar correo actual</button>
    </div>

    <script>
        // 🚨 PEGA AQUÍ LA URL DE TU APLICACIÓN WEB DE GOOGLE
        const GOOGLE_APP_URL = 'https://script.google.com/macros/s/AKfycbxWzBkmCKvS7a_la9znvSTy3_JRZeYGhPsxUGS5L2n_YgPLA4hH_heGzhuDmFM1imvtzQ/exec';

        function buscarEnlace() {
            const textoMensaje = document.getElementById('texto-mensaje');
            const botonEnlace = document.getElementById('botonEnlace');
            const spinner = document.getElementById('spinner');

            // Estado de carga
            textoMensaje.innerText = "Conectando con Gmail...";
            botonEnlace.style.display = 'none';
            spinner.style.display = 'block';

            // Petición al servidor de Google
            fetch(GOOGLE_APP_URL)
                .then(respuesta => {
                    if (!respuesta.ok) throw new Error('Error en la red');
                    return respuesta.json();
                })
                .then(datos => {
                    spinner.style.display = 'none'; // Ocultar animación
                    
                    if (datos.url) {
                        textoMensaje.innerText = datos.mensaje;
                        botonEnlace.href = datos.url;
                        botonEnlace.style.display = 'inline-block'; // Mostrar botón
                    } else {
                        textoMensaje.innerText = datos.mensaje;
                    }
                })
                .catch(error => {
                    spinner.style.display = 'none';
                    textoMensaje.innerText = "Hubo un problema de conexión con Google Apps Script.";
                    console.error("Detalle del error:", error);
                });
        }

        // Ejecutar la búsqueda automáticamente al cargar la página
        window.onload = buscarEnlace;
    </script>

</body>
</html>
